services:
  - type: web
    name: nidsdepoule
    runtime: python
    plan: free
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      echo "{\"git_commit\":\"$(git rev-parse HEAD 2>/dev/null || echo unknown)\",\"git_time\":\"$(git log -1 --format=%aI 2>/dev/null || echo unknown)\",\"build_time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > server/build_info.json
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NIDS_SERVER_ENV
        value: prod
      - key: NIDS_LOG_FORMAT
        value: json
      - key: TZ
        value: America/Montreal
      # S3/R2 persistent storage — set NIDS_STORAGE_BACKEND=s3 to enable.
      # Create a free Cloudflare R2 bucket, then set these in Render dashboard:
      #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      - key: NIDS_STORAGE_BACKEND
        value: s3
      - key: NIDS_STORAGE_S3_BUCKET
        sync: false   # set in Render dashboard
      - key: NIDS_STORAGE_S3_ENDPOINT
        sync: false   # https://<account_id>.r2.cloudflarestorage.com
      - key: AWS_ACCESS_KEY_ID
        sync: false   # set in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false   # set in Render dashboard
    healthCheckPath: /api/v1/health
