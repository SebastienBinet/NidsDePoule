services:
  - type: web
    name: nidsdepoule
    runtime: python
    plan: free
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      echo "{\"git_commit\":\"$(git rev-parse HEAD 2>/dev/null || echo unknown)\",\"git_time\":\"$(git log -1 --format=%aI 2>/dev/null || echo unknown)\",\"build_time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > server/build_info.json
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NIDS_SERVER_ENV
        value: prod
      - key: NIDS_LOG_FORMAT
        value: json
      - key: TZ
        value: America/Montreal
      # Firebase Storage — set NIDS_STORAGE_BACKEND=firebase to enable.
      # Create a Firebase project, enable Storage, then generate a service
      # account key (Project Settings → Service accounts → Generate new private key).
      # Paste the full JSON as NIDS_STORAGE_FIREBASE_CREDENTIALS_JSON in Render dashboard.
      - key: NIDS_STORAGE_BACKEND
        value: firebase
      - key: NIDS_STORAGE_FIREBASE_BUCKET
        sync: false   # e.g. nidsdepoulestorage.firebasestorage.app
      - key: NIDS_STORAGE_FIREBASE_CREDENTIALS_JSON
        sync: false   # paste the full service account JSON here
    healthCheckPath: /api/v1/health
